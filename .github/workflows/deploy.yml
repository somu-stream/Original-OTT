name: Deploy to Firebase Hosting
on:
  push:
    branches:
      - main
jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          firebaseServiceAccount: ''  # Ithai blank-ah vidunga
          firebaseToken: '${{ secrets.FIREBASE_TOKEN }}' # Ithu dhaan ippo main
          channelId: live
          projectId: somustream-95d00
